name: Build Linux deb

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux deb
        run: npm run dist:linux -- --publish never

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: wechat-writing-studio-linux-deb
          path: release/*.deb
          if-no-files-found: error

      - name: Attach deb to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "Desktop packages for WeWrite Studio." || \
              gh release view "$tag" >/dev/null
          fi

          gh release upload "$tag" release/*.deb --clobber
