<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>公众号写作台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div>
            <h1>公众号写作台</h1>
            <p id="dataPath"></p>
          </div>
          <button class="icon-button" id="newArticleButton" title="新建文章">+</button>
        </div>
        <div class="article-list" id="articleList"></div>
      </aside>

      <main class="workspace">
        <header class="editor-header">
          <div class="title-stack">
            <input id="titleInput" class="title-input" placeholder="文章标题" />
            <div class="meta-row">
              <input id="authorInput" placeholder="作者" />
              <input id="digestInput" placeholder="摘要" />
            </div>
          </div>
          <div class="header-actions">
            <button id="saveButton">保存</button>
            <button class="danger" id="deleteButton">删除</button>
          </div>
        </header>

        <section class="editor-grid">
          <div class="write-pane">
            <div class="pane-toolbar">
              <span>正文</span>
              <button id="chooseCoverButton">封面图</button>
            </div>
            <textarea id="contentInput" spellcheck="false"></textarea>
            <div class="field-line">
              <input id="coverPathInput" placeholder="封面图路径" />
              <input id="sourceUrlInput" placeholder="原文链接" />
            </div>
          </div>
          <div class="preview-pane">
            <div class="pane-toolbar">
              <span>预览</span>
              <div class="toggle-row">
                <label><input id="showCoverInput" type="checkbox" /> 显示封面</label>
                <label><input id="openCommentInput" type="checkbox" /> 开评论</label>
              </div>
            </div>
            <article id="preview"></article>
          </div>
        </section>
      </main>

      <aside class="inspector">
        <div class="tabs">
          <button class="tab active" data-tab="assistant">AI</button>
          <button class="tab" data-tab="wechat">微信</button>
          <button class="tab" data-tab="settings">设置</button>
        </div>

        <section class="panel active" id="assistantPanel">
          <div class="tool-grid">
            <button data-action="outline">提纲</button>
            <button data-action="titles">标题</button>
            <button data-action="rewrite">改写</button>
            <button data-action="summary">摘要</button>
            <button data-action="review">审稿</button>
            <button data-action="format">排版</button>
          </div>
          <textarea id="assistantNote" class="small-textarea" placeholder="补充要求"></textarea>
          <div class="assistant-output" id="assistantOutput"></div>
          <div class="split-actions">
            <button id="insertAssistantButton">插入</button>
            <button id="replaceAssistantButton">替换正文</button>
          </div>
        </section>

        <section class="panel" id="wechatPanel">
          <div class="status-strip" id="wechatStatus">未连接</div>
          <button id="testWechatButton">测试连接</button>
          <button id="createDraftButton">推送草稿箱</button>
          <button id="publishButton">提交发布</button>
          <button id="statusButton">查询状态</button>
          <div class="publish-fields">
            <label>draft media_id</label>
            <input id="draftMediaIdInput" readonly />
            <label>publish_id</label>
            <input id="publishIdInput" readonly />
            <label>article_id</label>
            <input id="articleIdInput" readonly />
          </div>
          <pre id="wechatLog"></pre>
        </section>

        <section class="panel" id="settingsPanel">
          <label>OpenAI API Key</label>
          <input id="openaiApiKeyInput" type="password" placeholder="留空表示不修改" />
          <label>OpenAI Model</label>
          <input id="openaiModelInput" />
          <label>微信公众号 AppID</label>
          <input id="wechatAppIdInput" />
          <label>微信公众号 AppSecret</label>
          <input id="wechatAppSecretInput" type="password" placeholder="留空表示不修改" />
          <button id="saveSettingsButton">保存设置</button>
          <div class="settings-state" id="settingsState"></div>
        </section>
      </aside>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
