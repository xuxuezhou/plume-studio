<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeWrite Studio</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="rail-brand" title="WeWrite Studio">W</div>
        <button class="rail-button" id="newArticleButton" title="New draft">+</button>
        <button class="rail-button active" id="toggleDraftsButton" title="Toggle drafts">D</button>
        <button class="rail-button" id="themeButton" title="Toggle theme">Dark</button>
        <button class="rail-button" id="toggleInspectorButton" title="Toggle panel">P</button>
        <div class="rail-spacer"></div>
        <p class="rail-caption">WeWrite</p>
      </aside>

      <aside class="draft-drawer">
        <div class="drawer-header">
          <div>
            <span class="eyebrow">Library</span>
            <h2>Drafts</h2>
          </div>
          <span id="draftCount" class="count-pill">0</span>
        </div>
        <div class="article-list" id="articleList"></div>
        <p id="dataPath" class="data-path"></p>
      </aside>

      <div class="resize-handle" id="draftResizeHandle" title="Resize drafts"></div>

      <main class="workspace">
        <header class="paperbar">
          <nav class="paper-tabs" aria-label="Document tools">
            <button class="paper-tab active">Draft</button>
            <button class="paper-tab" id="chooseCoverButton">Cover</button>
            <button class="paper-tab" id="saveButton">Save</button>
            <button class="paper-tab danger" id="deleteButton">Delete</button>
          </nav>
          <div class="paper-actions">
            <label><input id="showCoverInput" type="checkbox" /> Cover</label>
            <label><input id="openCommentInput" type="checkbox" /> Comments</label>
          </div>
        </header>

        <section class="editor-stage">
          <article class="editor-sheet">
            <div class="doc-kicker">Local WeChat Draft</div>
            <textarea id="titleInput" class="title-input" placeholder="Article title" rows="2"></textarea>
            <div class="meta-grid">
              <input id="authorInput" placeholder="Author" />
              <input id="digestInput" placeholder="Digest" />
            </div>
            <textarea id="contentInput" spellcheck="false"></textarea>
            <div class="field-line">
              <input id="coverPathInput" placeholder="Cover image path" />
              <input id="sourceUrlInput" placeholder="Source URL" />
            </div>
          </article>
        </section>
      </main>

      <div class="resize-handle" id="inspectorResizeHandle" title="Resize panel"></div>

      <aside class="inspector">
        <div class="tabs">
          <button class="tab active" data-tab="preview">Preview</button>
          <button class="tab" data-tab="assistant">Assistant</button>
          <button class="tab" data-tab="publish">Publish</button>
          <button class="tab" data-tab="settings">Settings</button>
        </div>

        <section class="panel active" id="previewPanel">
          <article id="preview"></article>
        </section>

        <section class="panel" id="assistantPanel">
          <div class="assistant-hero">
            <div class="spark">✧</div>
            <h2>Writing Assistant</h2>
            <p>Work from the selected text or the full draft.</p>
          </div>
          <div class="tool-grid">
            <button data-action="outline">Outline</button>
            <button data-action="titles">Titles</button>
            <button data-action="rewrite">Rewrite</button>
            <button data-action="summary">Digest</button>
            <button data-action="review">Review</button>
            <button data-action="format">Format</button>
          </div>
          <textarea id="assistantNote" class="small-textarea" placeholder="Extra instructions"></textarea>
          <div class="assistant-output" id="assistantOutput"></div>
          <div class="split-actions">
            <button id="insertAssistantButton">Insert</button>
            <button id="replaceAssistantButton">Replace Draft</button>
          </div>
        </section>

        <section class="panel" id="publishPanel">
          <div class="status-strip" id="wechatStatus">Not connected</div>
          <button id="testWechatButton">Test Connection</button>
          <button id="createDraftButton">Send to Draft Box</button>
          <button id="publishButton">Submit Publish</button>
          <button id="statusButton">Check Status</button>
          <div class="publish-fields">
            <label>draft media_id</label>
            <input id="draftMediaIdInput" readonly />
            <label>publish_id</label>
            <input id="publishIdInput" readonly />
            <label>article_id</label>
            <input id="articleIdInput" readonly />
          </div>
          <pre id="wechatLog"></pre>
        </section>

        <section class="panel" id="settingsPanel">
          <label>OpenAI API Key</label>
          <input id="openaiApiKeyInput" type="password" placeholder="Leave blank to keep current key" />
          <label>OpenAI Model</label>
          <input id="openaiModelInput" />
          <label>WeChat Official Account AppID</label>
          <input id="wechatAppIdInput" />
          <label>WeChat Official Account AppSecret</label>
          <input id="wechatAppSecretInput" type="password" placeholder="Leave blank to keep current secret" />
          <button id="saveSettingsButton">Save Settings</button>
          <button id="resetLayoutButton">Reset Layout</button>
          <div class="settings-state" id="settingsState"></div>
        </section>
      </aside>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
