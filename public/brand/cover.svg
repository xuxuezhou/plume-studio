<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Plume Studio — a quiet desk for writing, refining, and publishing">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c0a12"/>
      <stop offset="0.55" stop-color="#3a1224"/>
      <stop offset="1" stop-color="#6d1a3d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7da6" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#c46280" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="feather" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe3ec"/>
      <stop offset="0.5" stop-color="#ff9dbd"/>
      <stop offset="1" stop-color="#e2557f"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.72" cy="0.38" r="0.6">
      <stop offset="0" stop-color="#ff7da6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ff7da6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#halo)"/>

  <!-- faint writing lines, like a sheet of paper resting on the desk -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="2">
    <line x1="96" y1="452" x2="700" y2="452"/>
    <line x1="96" y1="492" x2="640" y2="492"/>
    <line x1="96" y1="532" x2="672" y2="532"/>
  </g>

  <!-- feather quill -->
  <g transform="translate(870 96) rotate(14)">
    <!-- shaft -->
    <path d="M14 434 C 60 330, 120 190, 232 44" fill="none" stroke="url(#glow)" stroke-width="7" stroke-linecap="round"/>
    <!-- vane -->
    <path d="M232 44
             C 150 96, 96 190, 74 300
             C 120 262, 152 236, 178 200
             C 166 252, 142 300, 106 350
             C 172 314, 216 262, 240 196
             C 238 240, 224 286, 196 336
             C 258 288, 290 214, 292 132
             C 276 96, 256 66, 232 44 Z"
          fill="url(#feather)" fill-opacity="0.92"/>
    <!-- rachis highlight -->
    <path d="M228 52 C 160 140, 110 250, 78 296" fill="none" stroke="#fff" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round"/>
    <!-- nib -->
    <path d="M14 434 L 2 466 L 34 452 Z" fill="#ffd9e5"/>
  </g>

  <!-- sparkles -->
  <g fill="#ffd9e5">
    <path d="M1050 120 l4 12 12 4 -12 4 -4 12 -4 -12 -12 -4 12 -4 Z" fill-opacity="0.9"/>
    <path d="M1150 260 l3 9 9 3 -9 3 -3 9 -3 -9 -9 -3 9 -3 Z" fill-opacity="0.6"/>
    <path d="M980 330 l2.5 7.5 7.5 2.5 -7.5 2.5 -2.5 7.5 -2.5 -7.5 -7.5 -2.5 7.5 -2.5 Z" fill-opacity="0.5"/>
  </g>

  <!-- wordmark -->
  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="96" y="150" fill="#ffd9e5" font-size="26" letter-spacing="10" font-family="Inter, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="600">A  QUIET  DESK  FOR  WRITERS</text>
    <text x="90" y="290" fill="#fff8fa" font-size="118" font-weight="bold" letter-spacing="2">Plume Studio</text>
    <text x="96" y="368" fill="#e8b8c8" font-size="34" font-style="italic">Write, refine, and publish — beautifully.</text>
  </g>

  <!-- footer chips -->
  <g font-family="Inter, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600">
    <g>
      <rect x="96" y="560" rx="19" width="196" height="38" fill="#ffffff" fill-opacity="0.08" stroke="#ff9dbd" stroke-opacity="0.45"/>
      <text x="118" y="586" fill="#ffd9e5">Markdown editor</text>
    </g>
    <g>
      <rect x="312" y="560" rx="19" width="176" height="38" fill="#ffffff" fill-opacity="0.08" stroke="#ff9dbd" stroke-opacity="0.45"/>
      <text x="334" y="586" fill="#ffd9e5">AI co-writing</text>
    </g>
    <g>
      <rect x="508" y="560" rx="19" width="256" height="38" fill="#ffffff" fill-opacity="0.08" stroke="#ff9dbd" stroke-opacity="0.45"/>
      <text x="530" y="586" fill="#ffd9e5">One-click publishing</text>
    </g>
  </g>
</svg>
